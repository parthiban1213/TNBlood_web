<!-- Leaflet CSS (for info/map page) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <!-- GitHub Pages SPA redirect decode — must come before React loads -->
  <script>
    (function() {
      var qs = window.location.search;
      if (qs && qs.indexOf('?p=') === 0) {
        var decoded = qs.slice(1)
          .split('&')
          .map(function(s) { return s.replace(/~and~/g, '&'); });
        window.history.replaceState(
          null, null,
          window.location.pathname.slice(0, -1) +
          (decoded[0] ? '/' + decoded[0].replace(/^p=\//, '') : '') +
          (decoded[1] ? '?' + decoded[1].replace(/^q=/, '') : '') +
          window.location.hash
        );
      }
    })();
  </script>
