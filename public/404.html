<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TNBlood</title>
  <script>
    // Single-Page App redirect for GitHub Pages.
    // Encodes the full URL into a query param and redirects to index.html.
    // The script in index.html will decode it and fix the URL before React boots.
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + 1).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
