name: Deploy to GitHub Pages

on:
  push:
    branches: [main]          # runs every time you push to main
  workflow_dispatch:           # lets you trigger it manually from GitHub UI

permissions:
  contents: write              # needed to push to gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install frontend dependencies (root package.json)
      - name: Install dependencies
        run: npm ci

      # 4. Build React app
      #    VITE_BASE_PATH must match your GitHub repo name exactly, e.g. /hsblood-react/
      #    VITE_RENDER_URL must match your Render backend URL exactly
      - name: Build
        env:
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
          VITE_RENDER_URL: ${{ vars.VITE_RENDER_URL }}
        run: npm run build

      # 5. Deploy dist/ to gh-pages branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true   # keeps gh-pages branch clean
